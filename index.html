<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HOPI – Group Calendar</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Calibri, sans-serif; background: #EDF2FA; }
.topbar { background: #1F3864; color: white; padding: 8px 16px; box-shadow: 0 2px 10px #0005; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.topbar label { font-size: 11px; color: #9DC3E6; margin-right: 3px; }
.topbar input[type=number] { padding: 4px 7px; border: none; border-radius: 5px; font-size: 12px; width: 68px; background: #2E4F7A; color: white; }
.tbtn { padding: 5px 13px; border: 1.5px solid #5BA3E0; border-radius: 5px; font-size: 12px; font-weight: 600; cursor: pointer; background: transparent; color: #9DC3E6; transition: background .15s; white-space: nowrap; }
.tbtn:hover { background: #2E4F7A; color: white; }
.seg { display: flex; border-radius: 5px; overflow: hidden; border: 1px solid #3A5F8A; flex-shrink: 0; }
.seg button { padding: 4px 10px; border: none; background: #2A4668; color: #8ABADD; font-size: 11px; font-weight: 600; cursor: pointer; border-right: 1px solid #3A5F8A; transition: background .12s; }
.seg button:last-child { border-right: none; }
.seg button.active { background: #5BA3E0; color: white; }
.seg button:hover:not(.active) { background: #344F6E; }
.sep { width: 1px; height: 22px; background: #2E4F7A; flex-shrink: 0; }
.overlay { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(10,20,40,.6); backdrop-filter: blur(2px); align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.panel { background: white; border-radius: 14px; box-shadow: 0 8px 40px #0006; width: 560px; max-width: 96vw; max-height: 90vh; display: flex; flex-direction: column; position: relative; }
.panel-wide { width: 820px; }
.panel-head { padding: 20px 24px 12px; border-bottom: 1px solid #EEF2F8; flex-shrink: 0; }
.panel-head h2 { font-size: 16px; font-weight: 600; color: #1F3864; margin-bottom: 3px; }
.panel-head .psub { font-size: 12px; color: #999; }
.panel-close { position: absolute; top: 14px; right: 18px; background: none; border: none; font-size: 20px; cursor: pointer; color: #bbb; line-height: 1; }
.panel-close:hover { color: #333; }
.panel-body { overflow-y: auto; padding: 14px 24px; flex: 1; }
.panel-foot { padding: 12px 24px; border-top: 1px solid #EEF2F8; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 10px; }
.task-row { display: grid; grid-template-columns: 4px 1fr 148px 32px; align-items: center; gap: 0 10px; padding: 9px 10px; border-radius: 9px; margin-bottom: 7px; border: 1px solid #E0E8F8; background: #F5F8FF; }
.task-row.ebt-row { background: #C0392B; border-color: #A93226; }
.task-row.ebt-row .task-info-name { color: white; }
.task-row.ebt-row .task-info-sub { color: rgba(255,255,255,.7); }
.task-color-bar { width: 4px; border-radius: 3px; align-self: stretch; min-height: 32px; }
.task-info { min-width: 0; }
.task-info-name { font-size: 12.5px; font-weight: 600; color: #1F3864; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.task-info-sub { font-size: 10.5px; color: #888; margin-top: 2px; }
.task-right { display: flex; align-items: center; gap: 5px; justify-content: flex-end; }
.task-right .dl-val { font-size: 14px; font-weight: 700; color: #1F3864; min-width: 28px; text-align: right; }
.ebt-row .task-right .dl-val { color: white; }
.task-right .unit { font-size: 11px; color: #999; white-space: nowrap; }
.ebt-row .task-right .unit { color: rgba(255,255,255,.7); }
.task-right .sep-txt { font-size: 12px; color: #aaa; }
.task-right input[type=number] { padding: 5px 6px; border: 1.5px solid #CBD5E8; border-radius: 7px; font-size: 13px; font-weight: 700; text-align: center; color: #1F3864; background: white; width: 50px; }
.task-right input:focus { outline: none; border-color: #2E75B6; }
.task-info input[type=text] { width: 100%; padding: 3px 6px; border: 1.5px solid #CBD5E8; border-radius: 6px; font-size: 12.5px; font-weight: 600; color: #1F3864; background: white; }
.task-info input[type=text]:focus { outline: none; border-color: #2E75B6; }
.ebt-row .task-info input[type=text] { background: rgba(255,255,255,.15); color: white; border-color: rgba(255,255,255,.3); }
.ebt-row .task-right input { background: rgba(255,255,255,.15); color: white; border-color: rgba(255,255,255,.3); }
.del-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #ccc; padding: 2px 4px; border-radius: 5px; }
.del-btn:hover { color: #C0392B; background: #FFEAEA; }
.ebt-row .del-btn { color: rgba(255,255,255,.5); }
.ebt-row .del-btn:hover { color: white; background: rgba(255,255,255,.2); }
.add-btn { display: flex; align-items: center; gap: 7px; padding: 9px 12px; border-radius: 9px; border: 1.5px dashed #CBD5E8; background: none; cursor: pointer; color: #888; font-size: 12px; font-weight: 600; width: 100%; }
.add-btn:hover { border-color: #2E75B6; color: #2E75B6; }
.btn-edit { padding: 7px 18px; border: 1.5px solid #2E75B6; border-radius: 8px; background: white; color: #2E75B6; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-edit:hover { background: #EBF3FF; }
.btn-apply { padding: 7px 20px; border: none; border-radius: 8px; background: #1F3864; color: white; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn-apply:hover { background: #2E75B6; }
.btn-cancel { padding: 7px 16px; border: 1.5px solid #CBD5E8; border-radius: 8px; background: white; font-size: 13px; color: #555; cursor: pointer; }
.btn-cancel:hover { background: #F0F4FF; }
.legend { display: flex; flex-wrap: wrap; gap: 5px 14px; padding: 7px 16px; background: #F7FAFF; border-bottom: 1px solid #D0DCF0; }
.leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #333; }
.ldot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
/* SharePoint: použij pevnou výšku nebo min-height místo 100vh */
.tbl-wrap { overflow: auto; height: 70vh; min-height: 400px; }
table { border-collapse: collapse; table-layout: fixed; width: max-content; }
col.c-month { width: 76px; } col.c-task { width: 155px; } col.c-comp { width: 58px; } col.c-term { width: 110px; } col.c-day { width: 28px; }
thead tr th { position: sticky; background: #1F3864; z-index: 10; }
thead tr:nth-child(1) th { top: 0; } thead tr:nth-child(2) th { top: 28px; }
td.c-month, th.c-month { position: sticky; left: 0; z-index: 8; }
td.c-task,  th.c-task  { position: sticky; left: 76px; z-index: 8; }
td.c-comp,  th.c-comp  { position: sticky; left: 231px; z-index: 8; }
td.c-term,  th.c-term  { position: sticky; left: 289px; z-index: 8; }
thead th.c-month, thead th.c-task, thead th.c-comp, thead th.c-term { z-index: 15; }
th { color: white; font-weight: 600; font-size: 11px; text-align: center; padding: 0 3px; height: 28px; border-right: 1px solid #2E4F7A; white-space: nowrap; overflow: hidden; }
th.c-month { text-align: left; padding-left: 10px; } th.c-task { text-align: left; padding-left: 10px; background: #1F3864; }
th.c-comp { background: #1F3864; } th.c-term { text-align: left; padding-left: 8px; background: #1F3864; color: #9DC3E6; font-size: 10px; }
th.h-daynum { font-size: 12px; font-weight: 700; } th.h-dayname { font-size: 9px; font-weight: 400; color: #9DC3E6; height: 22px; }
tr.mhdr td { background: #253C60; color: white; font-size: 11px; font-weight: 700; height: 22px; border-bottom: 2px solid #1F3864; border-right: 1px solid #1F3864; text-align: center; padding: 0 2px; }
tr.mhdr td.c-month { text-align: left; padding-left: 10px; font-size: 12px; color: white; }
tr.mhdr td.c-task { background: #253C60; } tr.mhdr td.c-comp { background: #253C60; } tr.mhdr td.c-term { background: #253C60; }
tr.mhdr td.we-d { background: #1E3250; color: #6A8AAC; } tr.mhdr td.hol-d { background: #3D1E1E; color: #FF9999; }
tr.trow td { height: 26px; border-bottom: 1px solid #E4EBF5; border-right: 1px solid #E4EBF5; vertical-align: middle; background: white; text-align: center; padding: 0 2px; white-space: nowrap; overflow: hidden; }
tr.trow.odd td { background: #F6F9FF; } tr.trow:hover td { background: #EBF3FF !important; }
tr.trow.ebt-trow td { background: #FADBD8 !important; }
tr.trow.ebt-trow td.c-task { background: #FADBD8 !important; color: #111; }
tr.trow.ebt-trow td.c-comp { background: #FADBD8 !important; color: #C0392B; }
tr.trow.ebt-trow td.c-term { background: #FADBD8 !important; }
tr.trow.ebt-trow td.we-d { background: #E8BEBC !important; } tr.trow.ebt-trow td.hol-d { background: #F5B7B1 !important; }
tr.trow.ebt-trow td.no-day { background: #F0CECE !important; } tr.trow.ebt-trow td.review-bg { background: #A9CCE3 !important; }
tr.trow.ebt-trow:hover td { background: #F5C6C2 !important; }
td.c-month { font-size: 10.5px; font-weight: 700; color: white !important; background: #2E4F7A !important; text-align: center; text-transform: uppercase; letter-spacing: .5px; border-right: 2px solid #1F3864; white-space: nowrap; overflow: hidden; padding: 0 4px; }
td.c-task { text-align: left; padding-left: 8px; border-left: 3px solid transparent; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; background: white; }
tr.trow.odd td.c-task { background: #F6F9FF; }
td.c-comp { font-size: 11px; font-weight: 700; text-align: center; background: white; white-space: nowrap; border-right: 1px solid #D0DCF0; }
tr.trow.odd td.c-comp { background: #F6F9FF; }
td.c-term { text-align: left; padding-left: 7px; background: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border-right: 2px solid #D0DCF0; }
tr.trow.odd td.c-term { background: #F6F9FF; }
td.we-d { background: #EBEBEB !important; } td.hol-d { background: #FFE8E8 !important; }
tr.trow.odd td.we-d { background: #E3E3E3 !important; } tr.trow.odd td.hol-d { background: #FFE0E0 !important; }
td.no-day { background: #F0F2F6 !important; border-right: none; }
td.review-bg { background: #C8DFF5 !important; } tr.trow.odd td.review-bg { background: #BDD8F2 !important; }
.dlmark { display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:700;color:white;line-height:1; }
.dlmark-shift { display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:700;color:white;line-height:1;opacity:.6; }
.dlmark-exact { display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;font-size:9px;font-weight:700;color:white;line-height:1; }
.dlmark-dep { display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:9px;font-weight:700;color:white;line-height:1;box-shadow:0 0 0 2px white inset; }
.hol-switcher { display:flex;align-items:center;gap:8px;padding:10px 24px;border-bottom:1px solid #EEF2F8;flex-shrink:0; }
.hol-switcher span { font-size:11px;color:#888; }
.hol-sw-btn { padding:3px 12px;border:1.5px solid #CBD5E8;border-radius:5px;background:white;color:#555;font-size:11px;font-weight:600;cursor:pointer; }
.hol-sw-btn.active { background:#2E75B6;border-color:#2E75B6;color:white; }
</style>
</head>

<div class="topbar">
  <div style="display:flex;align-items:center;justify-content:center;flex-shrink:0;height:46px;border-radius:5px;overflow:hidden;background:white;padding:2px 6px">
    <svg viewBox="0 0 234 230" width="68" height="40" xmlns="http://www.w3.org/2000/svg">
      <rect width="234" height="230" fill="white"/>

      <polyline points="179,8 226,8 226,55" fill="none" stroke="#2D8B3A" stroke-width="13" stroke-linecap="butt" stroke-linejoin="miter"/>
      <polyline points="8,175 8,222 55,222" fill="none" stroke="#2D8B3A" stroke-width="13" stroke-linecap="butt" stroke-linejoin="miter"/>
      <polyline points="179,222 226,222 226,175" fill="none" stroke="#2D8B3A" stroke-width="13" stroke-linecap="butt" stroke-linejoin="miter"/>
      <text x="117" y="148" text-anchor="middle" font-family="Arial Black,Impact,sans-serif" font-weight="900" font-size="100" fill="#1C1C1C">HOPI</text>
      <rect x="8" y="188" width="218" height="26" fill="#2D8B3A"/>
      <text x="117" y="208" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="22" letter-spacing="5" fill="white">HOLDING</text>
    </svg>
  </div>
  <div class="sep"></div>
  <span style="font-size:17px;font-weight:700;letter-spacing:.4px;white-space:nowrap">FINANCE / CONTROLLING – Group Calendar</span>
  <div class="sep"></div>
  <div><label id="lbl-year">Year</label><input type="number" id="yr" value="2026" min="2024" max="2035" onchange="build()"></div>
  <div><label id="lbl-firms">Companies</label><input type="number" id="fc" value="28" min="1" max="999"></div>
  <div class="sep"></div>
  <span id="lbl-shift" style="font-size:11px;color:#9DC3E6">Shift:</span>

    <button id="btn-before" class="active" onclick="setMode('pred',this)">Before</button>
    <button id="btn-on" onclick="setMode('na',this)">On</button>
    <button id="btn-after" onclick="setMode('po',this)">After</button>
  </div>
  <div class="sep"></div>
  <span id="lbl-country" style="font-size:11px;color:#9DC3E6">Holidays:</span>
  <div class="seg" id="seg-country">
    <button class="active" onclick="setCountry('cz',this)">CZ</button>
    <button onclick="setCountry('sk',this)">SK</button>
    <button onclick="setCountry('pl',this)">PL</button>
    <button onclick="setCountry('hu',this)">HU</button>
    <button onclick="setCountry('ro',this)">RO</button>
    <button id="btn-all-country" onclick="setCountry('all',this)">ALL</button>
  </div>
  <div class="sep"></div>
  <button id="btn-panel" class="tbtn" onclick="openPanel()">📋 Task overview – deadlines</button>
  <button id="btn-holidays" class="tbtn" onclick="openHolidays()">🗓 Holidays</button>
  <button class="tbtn" onclick="window.print()">🖨 PDF</button>
  <div class="sep"></div>
  <span id="lbl-lang" style="font-size:11px;color:#9DC3E6">Language:</span>
  <div class="seg" id="seg-lang">
    <button class="active" onclick="switchLang('en',this)">EN</button>
    <button onclick="switchLang('cz',this)">CZ</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closePanel()">
  <div class="panel">
    <div class="panel-head">
      <button class="panel-close" onclick="closePanel()">✕</button>
      <h2 id="panel-title"></h2><p class="psub" id="panel-sub"></p>
    </div>
    <div class="panel-body" id="panel-body"></div>
    <div class="panel-foot" id="panel-foot"></div>
  </div>
</div>

<div class="overlay" id="hol-overlay" onclick="if(event.target===this)closeHolidays()">
  <div class="panel panel-wide">
    <div class="panel-head">
      <button class="panel-close" onclick="closeHolidays()">✕</button>
      <h2 id="hol-title"></h2><p class="psub" id="hol-sub"></p>
    </div>
    <div class="hol-switcher" id="hol-switcher"></div>
    <div class="panel-body" style="padding:0 0 8px;" id="hol-body"></div>
    <div class="panel-foot" style="justify-content:flex-end;">
      <button class="btn-cancel" id="hol-close-btn" onclick="closeHolidays()">Close</button>
    </div>
  </div>
</div>

<div class="legend" id="leg"></div>
<div class="tbl-wrap">
  <table id="tbl"><colgroup id="cg"></colgroup><thead id="thead"></thead><tbody id="tbody"></tbody></table>
</div>

<script>

var SK = 'gc_labels_v2';

}

};

function easterW(y){var g=y%19,c=Math.floor(y/100),h=(c-Math.floor(c/4)-Math.floor((8*c+13)/25)+19*g+15)%30,i=h-Math.floor(h/28)*(1-Math.floor(29/(h+1))*Math.floor((21-g)/11)),j=(y+Math.floor(y/4)+i+2-c+Math.floor(c/4))%7,l=i-j,mo=3+Math.floor((l+40)/44),dy=l+28-31*Math.floor(mo/4);return new Date(y,mo-1,dy);}
function easterO(y){var a=y%4,b=y%7,c=y%19,d=(19*c+15)%30,e=(2*a+4*b-d+34)%7,mo=Math.floor((d+e+114)/31),dy=(d+e+114)%31+1;return new Date(y,mo-1,dy+13);}

function getHols(y){var s=new Set(),ew=easterW(y),eo=easterO(y);function af(md){var p=md.split('-');s.add(y+'-'+p[0]+'-'+p[1]);}var list=curCountry==='all'?COUNTRIES:[curCountry];list.forEach(function(co){if(co==='cz'){['01-01','05-01','05-08','07-05','07-06','09-28','10-28','11-17','12-24','12-25','12-26'].forEach(af);s.add(dk(addDays(ew,-2)));s.add(dk(addDays(ew,1)));}else if(co==='sk'){['01-01','01-06','05-01','05-08','07-05','08-29','09-01','09-15','11-01','11-17','12-24','12-25','12-26'].forEach(af);s.add(dk(addDays(ew,-2)));s.add(dk(addDays(ew,1)));}else if(co==='pl'){['01-01','01-06','05-01','05-03','08-15','11-01','11-11','12-25','12-26'].forEach(af);s.add(dk(addDays(ew,1)));s.add(dk(addDays(ew,49)));s.add(dk(addDays(ew,60)));}else if(co==='hu'){['01-01','03-15','05-01','08-20','10-23','11-01','12-25','12-26'].forEach(af);s.add(dk(addDays(ew,-2)));s.add(dk(addDays(ew,1)));s.add(dk(addDays(ew,50)));}else if(co==='ro'){['01-01','01-02','01-24','05-01','06-01','08-15','11-30','12-01','12-25','12-26'].forEach(af);s.add(dk(eo));s.add(dk(addDays(eo,1)));s.add(dk(addDays(eo,49)));s.add(dk(addDays(eo,50)));}});return s;}
function getHolsList(y,co){var ew=easterW(y),eo=easterO(y),r=[];function af(md){var p=md.split('-').map(Number);r.push({date:new Date(y,p[0]-1,p[1]),key:md});}function ad(dt,k){r.push({date:dt,key:k});}if(co==='cz'){['01-01','05-01','05-08','07-05','07-06','09-28','10-28','11-17','12-24','12-25','12-26'].forEach(af);ad(addDays(ew,-2),'gf');ad(addDays(ew,1),'em');}else if(co==='sk'){['01-01','01-06','05-01','05-08','07-05','08-29','09-01','09-15','11-01','11-17','12-24','12-25','12-26'].forEach(af);ad(addDays(ew,-2),'gf');ad(addDays(ew,1),'em');}else if(co==='pl'){['01-01','01-06','05-01','05-03','08-15','11-01','11-11','12-25','12-26'].forEach(af);ad(addDays(ew,1),'em');ad(addDays(ew,49),'pent');ad(addDays(ew,60),'cc');}else if(co==='hu'){['01-01','03-15','05-01','08-20','10-23','11-01','12-25','12-26'].forEach(af);ad(addDays(ew,-2),'gf');ad(addDays(ew,1),'em');ad(addDays(ew,50),'wm');}else if(co==='ro'){['01-01','01-02','01-24','05-01','06-01','08-15','11-30','12-01','12-25','12-26'].forEach(af);ad(eo,'oes');ad(addDays(eo,1),'oem');ad(addDays(eo,49),'opent');ad(addDays(eo,50),'owm');}r.sort(function(a,b){return a.date-b.date;});return r;}

function isNonWork(dt,hols){return dt.getDay()===0||dt.getDay()===6||hols.has(dk(dt));}
function resolveDL(y,m,day,hols,mode){var o=new Date(y,m-1,day);if(mode==='na')return o;if(!isNonWork(o,hols))return o;if(mode==='pred'){var d=new Date(o);d.setDate(d.getDate()-1);while(isNonWork(d,hols))d.setDate(d.getDate()-1);return d;}var d2=new Date(o);d2.setDate(d2.getDate()+1);while(isNonWork(d2,hols))d2.setDate(d2.getDate()+1);return d2;}
function nextWD(dt,hols){var d=new Date(dt);d.setDate(d.getDate()+1);while(isNonWork(d,hols))d.setDate(d.getDate()+1);return d;}

  });

  var months=TR[curLang].months,days=TR[curLang].days;
  var leg=document.getElementById('leg');
  leg.innerHTML=tasks.map(function(tk){return'<div class="leg"><div class="ldot" style="background:'+(isEbt(tk)?'#FADBD8;border:1px solid #C0392B':tk.color)+'"></div>'+tk.lbl+'</div>';}).join('')+'<div class="leg"><div class="ldot" style="background:#C8DFF5;border:1px solid #aac"></div>'+lc('legendReview')+'</div><div class="leg"><div class="ldot" style="background:#E3E3E3;border:1px solid #bbb"></div>'+lc('legendWeekend')+'</div><div class="leg"><div class="ldot" style="background:#FFE0E0;border:1px solid #f99"></div>'+lc('legendHoliday')+'</div>';
  var cg=document.getElementById('cg');cg.innerHTML='';['c-month','c-task','c-comp','c-term'].forEach(function(c){var col=document.createElement('col');col.className=c;cg.appendChild(col);});for(var i=0;i<MAX;i++){var col=document.createElement('col');col.className='c-day';cg.appendChild(col);}
  var thead=document.getElementById('thead');thead.innerHTML='';
  var tr1=el('tr');tr1.appendChild(el('th','c-month h-daynum',lc('colMonth')));tr1.appendChild(el('th','c-task h-daynum',lc('colTask')));tr1.appendChild(el('th','c-comp h-daynum',lc('colComp')));tr1.appendChild(el('th','c-term h-daynum',lc('colDeadline')));
  for(var d=1;d<=MAX;d++){var th=el('th','h-daynum');th.textContent=d;tr1.appendChild(th);}thead.appendChild(tr1);
  var tr2=el('tr');['c-month h-dayname','c-task h-dayname','c-comp h-dayname','c-term h-dayname'].forEach(function(c){tr2.appendChild(el('th',c,''));});for(var d2=1;d2<=MAX;d2++)tr2.appendChild(el('th','h-dayname',''));thead.appendChild(tr2);
  var tbody=document.getElementById('tbody');tbody.innerHTML='';
  for(var m=1;m<=12;m++){
    var dim=new Date(yr,m,0).getDate(),nextM=m===12?1:m+1;
    var dayInfo=[];for(var d3=1;d3<=MAX;d3++){if(d3<=dim){var dt=new Date(yr,m-1,d3);dayInfo.push({d:d3,isWE:dt.getDay()===0||dt.getDay()===6,isHol:hols.has(dk(dt)),exists:true,dn:days[dt.getDay()]});}else dayInfo.push({d:d3,exists:false});}
    var resolved={};tasks.forEach(function(tk){if(tk.dlEnd===null){var rdt=resolveDL(yr,m,tk.dl,hols,globalMode),depShifted=false;if(tk.dep&&resolved[tk.dep]){var minRdt=nextWD(resolved[tk.dep].rdt,hols);if(rdt<=resolved[tk.dep].rdt){rdt=minRdt;depShifted=true;}}resolved[tk.key]={day:rdt.getDate(),rdt:rdt,origIsNW:isNonWork(new Date(yr,m-1,tk.dl),hols),depShifted:depShifted};}});
    var mhdr=el('tr','mhdr');var tdmh=el('td','c-month');tdmh.textContent=months[m-1].toUpperCase();mhdr.appendChild(tdmh);mhdr.appendChild(el('td','c-task',''));mhdr.appendChild(el('td','c-comp',''));mhdr.appendChild(el('td','c-term',''));
    dayInfo.forEach(function(info){var td=el('td');if(!info.exists)td.className='no-day';else{td.className=info.isHol?'hol-d':info.isWE?'we-d':'';td.textContent=info.dn;td.style.cssText='font-size:9px;text-align:center;color:'+(info.isHol?'#FFAAAA':info.isWE?'#8FA8C8':'#9DC3E6');}mhdr.appendChild(td);});tbody.appendChild(mhdr);
    tasks.forEach(function(tk,ti){
      var ebt=isEbt(tk);var tr=el('tr','trow'+(ebt?' ebt-trow':ti%2?' odd':''));
      if(ti===0){var tdM=el('td','c-month');tdM.rowSpan=tasks.length;tdM.textContent=months[m-1];tr.appendChild(tdM);}
      var tdN=el('td','c-task');tdN.style.borderLeftColor=ebt?'#C0392B':tk.color;tdN.innerHTML='<span style="color:'+(ebt?'#C0392B':tk.color)+';margin-right:5px;font-size:13px">●</span><span style="color:#111;font-size:13px;font-weight:600">'+tk.lbl+'</span>';tr.appendChild(tdN);
      var tdC=el('td','c-comp',ebt?lc('compGroup'):lc('compLocal'));tdC.style.color=ebt?'#C0392B':'#555';tr.appendChild(tdC);
      var tdT=el('td','c-term'),tc=ebt?'#C0392B':tk.color;
      if(tk.dlEnd!==null){tdT.textContent=p2(tk.dl)+'.'+p2(m)+'. – '+p2(tk.dlEnd)+'.'+p2(nextM)+'.';tdT.style.cssText='color:'+tc+';font-weight:700;font-size:13px;';}
      else{var res=resolved[tk.key],rdt2=res.rdt,s=p2(rdt2.getDate())+'.'+p2(m)+'.'+yr+' '+days[rdt2.getDay()];if(res.depShifted)s+=' ⚑';else if(res.origIsNW&&globalMode!=='na')s+=globalMode==='pred'?' ←':' →';tdT.textContent=s;tdT.style.cssText='color:'+tc+';font-weight:700;font-size:13px;'+(res.depShifted?'text-decoration:underline;':'')+(res.origIsNW&&globalMode==='na'?'text-decoration:underline dotted;':'');}
      tr.appendChild(tdT);
      dayInfo.forEach(function(info){var td=el('td');if(!info.exists)td.className='no-day';else{if(info.isHol)td.className='hol-d';else if(info.isWE)td.className='we-d';if(tk.dlEnd!==null){if(info.d>=tk.dl||info.d<=tk.dlEnd)td.className='review-bg';}else{var res2=resolved[tk.key];if(info.d===res2.day){td.textContent='';var sp=document.createElement('span');sp.className=res2.depShifted?'dlmark-dep':globalMode==='na'?'dlmark-exact':res2.origIsNW?'dlmark-shift':'dlmark';sp.style.background=ebt?'#C0392B':tk.color;sp.style.color='white';sp.textContent=info.d;td.appendChild(sp);}}}tr.appendChild(td);});
      tbody.appendChild(tr);
    });
  }
}

// ── Startup ───────────────────────────────────────────────────
sLoad(function(stored){
  G=stored||{};
  if(!G.labels)G.labels={};
  if(!G.deadlines)G.deadlines={};
  tasks=makeTasks(curLang);
  applyLabels();
  build();
});
</script>
